1133" x="1653.22" y="197.1677">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="183.022" x="1653.22" y="212.4783">It helps identify and describe</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="87.5405" x="1653.22" y="227.7888">the container.</text></g><g class="entity" data-qualified-name="GMN30" data-source-line="51" id="ent0031"><path d="M1898.1,148.9783 L1898.1,235.531 L2119.9018,235.531 L2119.9018,158.9783 L2109.9018,148.9783 L1898.1,148.9783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M2109.9018,148.9783 L2109.9018,158.9783 L2119.9018,158.9783 L2109.9018,148.9783" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="181.5938" x="1904.1" y="166.5466">The real files are stored here</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="153.0103" x="1904.1" y="181.8572">as an encrypted archive.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="4.1133" x="1904.1" y="197.1677">&#160;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="154.8384" x="1904.1" y="212.4783">This part cannot be read</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="200.8018" x="1904.1" y="227.7888">without the correct access data.</text></g><!--link Container to Header--><g class="link" data-entity-1="ent0001" data-entity-2="ent0002" data-link-type="dependency" data-source-line="30" id="lnk21"><path d="M1017.12,68.0483 C899.33,70.1283 643.02,76.9883 609,97.7683 C588.655,110.1933 574.77,133.0333 565.915,153.027 C564.8081,155.5262 563.7798,157.981 562.8274,160.3654 C562.3511,161.5576 561.8938,162.7321 561.4551,163.8859 C561.3455,164.1744 562.9952,159.7808 562.8879